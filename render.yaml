services:
  - type: web
    name: codeascend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers=2 --threads=4 --timeout=120 --bind=0.0.0.0:$PORT
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # You will paste this in the Render dashboard
      - key: FLASK_SECRET_KEY
        generateValue: true  # Render auto-generates a secure random value
      - key: PYTHON_VERSION
        value: "3.11.0"
